{% extends "contributors/contrib_base.html" %}
{% block extra_header %}
{{ form.media }}
{% endblock %}
{% block content %}
{% if form %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Change Password</button>
  </form>
{% else %}
  <p>This reset link is invalid or has expired.</p>
  <p><a href="{% url 'password_reset' %}">Request a new one</a></p>
{% endif %}
{% endblock %}
